<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% include seo.html %}
<meta name="application-name" content="{{ site.title | escape }}">
<meta property="og:site_name" content="{{ site.title | escape }}">
<meta name="theme-color" content="#040a12">
<meta name="color-scheme" content="dark">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }} Feed" href="{{ '/feed.xml' | absolute_url }}">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
