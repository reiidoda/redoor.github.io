<header class="site-header" data-site-header>
  <div class="shell-wide header-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="ReDoor home">
      <span class="brand-mark-wrap" aria-hidden="true">
        <img class="brand-mark" src="{{ '/favicon.svg' | relative_url }}" alt="" width="24" height="24" loading="eager" decoding="async">
      </span>
      <span class="brand-copy">
        <span class="brand-name">ReDoor</span>
        <span class="brand-tag">{{ site.data.site.tagline }}</span>
      </span>
    </a>

    <button
      type="button"
      class="menu-toggle"
      data-menu-toggle
      aria-expanded="false"
      aria-controls="primary-navigation"
      aria-label="Open navigation"
    >
      <span class="menu-toggle-label">Menu</span>
      <span class="menu-toggle-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <nav id="primary-navigation" class="site-nav" data-site-nav aria-label="Primary navigation">
      <ul class="menu">
        {% for item in site.data.navigation %}
          <li>
            <a
              href="{% if item.external %}{{ item.url }}{% else %}{{ item.url | relative_url }}{% endif %}"
              data-nav-link
              {% if item.external %}target="_blank" rel="noopener noreferrer"{% endif %}
            >
              {{ item.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
