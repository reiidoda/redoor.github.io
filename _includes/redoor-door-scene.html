<div class="hero-visual hero-door-scene" data-reveal aria-hidden="true">
  <div class="hero-door-scene__field" aria-hidden="true"></div>

  <div class="hero-door-scene__stage">
    <div class="hero-door-scene__portal">
      <span class="hero-door-scene__backlight" aria-hidden="true"></span>
      <span class="hero-door-scene__hinge hero-door-scene__hinge--top" aria-hidden="true"></span>
      <span class="hero-door-scene__hinge hero-door-scene__hinge--mid" aria-hidden="true"></span>
      <span class="hero-door-scene__hinge hero-door-scene__hinge--bottom" aria-hidden="true"></span>

      <div class="hero-door" aria-hidden="true">
        <span class="hero-door__panel hero-door__panel--main"></span>
        <span class="hero-door__panel hero-door__panel--edge"></span>
        <span class="hero-door__panel hero-door__panel--inner"></span>
        <span class="hero-door__split hero-door__split--left"></span>
        <span class="hero-door__split hero-door__split--right"></span>
        <span class="hero-door__knob"></span>
      </div>

      <span class="hero-door-scene__threshold" aria-hidden="true"></span>
    </div>

    <span class="hero-door-scene__shadow" aria-hidden="true"></span>

    <div class="hero-door-scene__chips" aria-label="Hero visual callouts">
      <span class="hero-door-chip hero-door-chip--client">Client runtime</span>
      <span class="hero-door-chip hero-door-chip--relay">Untrusted relay</span>
      <span class="hero-door-chip hero-door-chip--directory">Directory DHT</span>
      <span class="hero-door-chip hero-door-chip--chain">Evidence plane</span>
    </div>
  </div>

  <div class="hero-door-scene__legend">
    <p>Half-open by design: trusted edges guard state, the middle remains opaque, and evidence persists only as commitments.</p>
  </div>
</div>
