    @keyframes dash {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -34; }
    }
    @keyframes relayGlow {
      0%, 100% { opacity: .72; }
      50% { opacity: 1; }
    }
    @keyframes nodePulse {
      0%, 100% { opacity: .92; }
      50% { opacity: .72; }
    }
