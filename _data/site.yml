  headline: ReDoor
  subheadline: Privacy-first secure messaging with untrusted relays
  summary: >
    Open-source secure messaging architecture built around X3DH and Double Ratchet foundations,
    relay-blind forwarding, volatile client state, and blockchain-backed tamper evidence.
