name: ReDoor
tagline: Privacy-first secure messaging with untrusted relays
description: ReDoor is a privacy-first secure messaging platform that treats relays as untrusted infrastructure, keeps sensitive client state volatile, and builds toward stronger metadata resistance and tamper evidence.
